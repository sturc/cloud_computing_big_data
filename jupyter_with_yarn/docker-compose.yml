services:
  hadoop:
    image: "csturm/hadoop-python:h3.3.6-p3.9.20-j11-v2"
    container_name: "hadoop"
    networks:
      hadoop_cluster:
        ipv4_address: "192.168.11.2"
    ports:
      - "8020:8020"
      - "8042:8042"
      - "8088:8088" 
      - "9000:9000"
      - "9864:9864"
      - "9865:9865"
      - "9868:9868"
      - "9870:9870"
      - "9871:9871"
      - "10020:10020"
      - "19888:19888" 
    # stdin_open: true
    # tty: true
  jupyter:
    #image: "quay.io/jupyter/pyspark-notebook@sha256:06c3d1db5d51f8be929f07a419b9f0374bbe7e9e22dd494e3fc2308c617c8f67"
    image: "quay.io/jupyter/pyspark-notebook:spark-3.5.3"
    container_name: "notebook"
    environment:
      - HADOOP_CONF_DIR=/home/jovyan/hadoop-configs/
      - DOCKER_BUILDKIT=0
      - JUPYTER_ENABLE_LAB=yes
    ports:
      - "8888:8888"
    volumes:
       - "${DS_BD_DIR}:/home/jovyan/work"  
       - "${DS_BD_DIR}/hadoop-configs:/home/jovyan/hadoop-configs"
       - "./pyspark-notebook/before-notebook:/usr/local/bin/before-notebook.d/"
    networks:
      hadoop_cluster:
        ipv4_address: "192.168.11.3"   
  minio:
    container_name: Minio
    #image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9011" --address ":9010"
    ports:
      - '9010:9010'
      - '9011:9011'
    volumes:
      - ./minio/data:/data
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD_FILE=/run/secrets/minio_secret
    secrets:
      - minio_secret
    restart: unless-stopped
    networks:
      hadoop_cluster:
        ipv4_address: "192.168.11.4"
    
networks:
  hadoop_cluster:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet:  192.168.11.0/24

secrets:
  minio_secret:
    file: ./minio_pw.txt